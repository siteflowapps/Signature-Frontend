name: Deploy

# ─────────────────────────────────────────────────────────────────────────
# CDO Frontend deploy pipeline
#
# Triggers:
#   push to `qa`  → builds multi-arch, deploys to QA EC2 via SSM
#   (UAT/prod wired later when Fargate frontend services exist)
#
# Why multi-arch: QA EC2 is arm64; same image manifest works for both archs.
# ─────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [qa]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  AWS_ROLE: arn:aws:iam::328815106018:role/siteflow-cdo-github-actions
  ECR_REPOSITORY: siteflow-cdo-frontend
  QA_INSTANCE_ID: i-0f0f21fa29ddaae74
  QA_SERVICE_NAME: cdo-frontend

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-${{ github.run_id }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push (linux/amd64 + linux/arm64)
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:${REF_NAME}-${SHA}"
          LATEST="$REGISTRY/$ECR_REPOSITORY:${REF_NAME}-latest"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "$IMAGE" \
            --tag "$LATEST" \
            --push \
            .

  deploy-qa:
    name: Deploy to QA (SSM → EC2)
    needs: build
    if: github.ref_name == 'qa'
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-${{ github.run_id }}

      - name: SSM RunCommand → deploy.sh cdo-frontend
        env:
          INSTANCE_ID: ${{ env.QA_INSTANCE_ID }}
          SERVICE: ${{ env.QA_SERVICE_NAME }}
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy cdo-frontend from $GITHUB_SHA" \
            --parameters "commands=[\"/opt/siteflow/deploy.sh $SERVICE\"]" \
            --query 'Command.CommandId' --output text)
          echo "Command ID: $CMD_ID"
          while :; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "InProgress")
            echo "status: $STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query '[StandardOutputContent,StandardErrorContent]' \
                  --output text
                exit 1
                ;;
              *) sleep 10 ;;
            esac
          done
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text | tail -n 50
