name: Deploy Static (S3 + CloudFront)

# ─────────────────────────────────────────────────────────────────────────
# Signature Frontend — UAT/Prod deploy to S3 + CloudFront
#
# Triggers:
#   push to `uat`        → builds, syncs to UAT S3 bucket, invalidates UAT CF
#   tag matching `prod-v*` → builds, syncs to PROD S3 bucket, invalidates PROD CF
#                            (tag must be on `main`)
#
# QA stays on deploy.yml (Docker → ECR → SSM EC2). This file is the static
# React build → S3 → CloudFront path for UAT/prod.
#
# No Docker, no env-var injection at build time. Vite's production build
# uses relative `/api/v1/*` paths; CloudFront's path-pattern routing
# forwards those to the signature ALB. Same artifact bytes deployed to
# UAT and prod (immutable hash-named bundles + cache-busted index.html).
#
# NOTE: signature-prod CF distribution has flip_dns=false (Option B
# dormant). Push to a prod-v* tag will deploy to the prod S3 bucket and
# invalidate the prod CF distribution, but signature.siteflow.tech apex
# isn't aliased there yet — to expose, update siteflow-infrastructure TF
# to set flip_dns=true on signature-prod in cloudfront_frontend.tf + apply.
# ─────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [uat]
    tags: ['prod-v*']

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  AWS_ROLE: arn:aws:iam::328815106018:role/siteflow-signature-frontend-deploy

  # Static deploy targets — created by siteflow-infrastructure Session 38.
  S3_BUCKET_UAT: siteflow-signature-uat-frontend-328815106018
  S3_BUCKET_PROD: siteflow-signature-prod-frontend-328815106018
  CF_DIST_UAT: EQOHGB9IODMHF
  CF_DIST_PROD: EEE9NYO9TZDQ4

jobs:
  deploy-static:
    name: Build, sync to S3, invalidate CloudFront
    runs-on: ubuntu-latest
    # NOTE: no `environment:` keyword — siteflowapps is on GitHub Free plan
    # which doesn't allow Environments on private repos. OIDC trust on the
    # AWS IAM role uses ref-based subs (refs/heads/uat, refs/tags/prod-v*).

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-${{ github.run_id }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve env-scoped deploy targets
        id: targets
        run: |
          if [[ "$GITHUB_REF" == refs/tags/prod-v* ]]; then
            echo "bucket=${{ env.S3_BUCKET_PROD }}" >> "$GITHUB_OUTPUT"
            echo "dist=${{ env.CF_DIST_PROD }}"     >> "$GITHUB_OUTPUT"
            echo "label=prod"                       >> "$GITHUB_OUTPUT"
          else
            echo "bucket=${{ env.S3_BUCKET_UAT }}"  >> "$GITHUB_OUTPUT"
            echo "dist=${{ env.CF_DIST_UAT }}"      >> "$GITHUB_OUTPUT"
            echo "label=uat"                        >> "$GITHUB_OUTPUT"
          fi

      - name: Sync ./dist/ to S3
        env:
          BUCKET: ${{ steps.targets.outputs.bucket }}
        run: |
          set -euo pipefail
          aws s3 sync ./dist/ "s3://$BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp ./dist/index.html "s3://$BUCKET/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront
        env:
          DIST: ${{ steps.targets.outputs.dist }}
        run: |
          set -euo pipefail
          INVAL=$(aws cloudfront create-invalidation \
            --distribution-id "$DIST" \
            --paths "/index.html" "/" \
            --query 'Invalidation.Id' --output text)
          echo "Invalidation: $INVAL"
          aws cloudfront wait invalidation-completed \
            --distribution-id "$DIST" \
            --id "$INVAL"
          echo "✅ Deployed to ${{ steps.targets.outputs.label }} (distribution $DIST)"
